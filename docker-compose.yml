services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ehailing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ehailing
      POSTGRES_USER: ehailing
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehailing -d ehailing"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ehailing_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ehailing_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://ehailing:${POSTGRES_PASSWORD}@postgres:5432/ehailing
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TOMTOM_API_KEY: ${TOMTOM_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      DRIVER_BASE_LAT: ${DRIVER_BASE_LAT:-3.1073}
      DRIVER_BASE_LNG: ${DRIVER_BASE_LNG:-101.6369}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ehailing_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
